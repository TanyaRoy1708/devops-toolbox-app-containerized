services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devops-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: devops_toolbox
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - devops-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - devops-network

networks:
  devops-network:
    driver: bridge

volumes:
  # MySQL data is persisted across restarts via named volume.
  # Redis data is intentionally ephemeral — resets on 'docker compose down'.
  db_data:
